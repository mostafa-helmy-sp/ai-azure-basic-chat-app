<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent Chat</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background-color: #f4f4f9; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; }
        .message { margin-bottom: 15px; padding: 10px 15px; border-radius: 18px; max-width: 70%; line-height: 1.4; }
        .user { background-color: #007bff; color: white; align-self: flex-end; margin-left: 30%; }
        .agent { background-color: #e9e9eb; color: black; align-self: flex-start; margin-right: 30%; }
        .thinking { color: #888; font-style: italic; }
        #form { display: flex; padding: 10px; border-top: 1px solid #ddd; background-color: #fff; }
        #input { flex: 1; border: 1px solid #ccc; border-radius: 18px; padding: 10px 15px; font-size: 16px; }
        #input:focus { outline: none; border-color: #007bff; }
        button { border: none; background: #007bff; color: white; padding: 10px 15px; margin-left: 10px; border-radius: 50%; font-size: 18px; cursor: pointer; }
        button:disabled { background: #a0a0a0; }
    </style>
</head>
<body>
    <div id="chat-container"></div>
    <form id="form">
        <input id="input" autocomplete="off" placeholder="Ask anything...">
        <button id="submitBtn" disabled>&#10148;</button>
    </form>

    <script>
        const form = document.getElementById('form');
        const input = document.getElementById('input');
        const submitBtn = document.getElementById('submitBtn');
        const chatContainer = document.getElementById('chat-container');
        let thread_id = null;

        // Enable button only when input has text
        input.addEventListener('input', () => {
            submitBtn.disabled = !input.value.trim();
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const content = input.value.trim();
            if (!content) return;

            // Display user message and clear input
            addMessage(content, 'user');
            input.value = '';
            submitBtn.disabled = true;

            // Display thinking indicator
            const thinkingMessage = addMessage('...', 'agent thinking');

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content, thread_id })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'Server error');
                }

                const data = await response.json();
                thread_id = data.thread_id; // Store thread_id for next message

                // Update thinking message with the actual response
                thinkingMessage.textContent = data.response;
                thinkingMessage.classList.remove('thinking');

            } catch (error) {
                thinkingMessage.textContent = `Error: ${error.message}`;
                thinkingMessage.classList.remove('thinking');
                thinkingMessage.style.color = 'red';
            }
        });

        function addMessage(text, type) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', type);
            messageDiv.textContent = text;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return messageDiv;
        }
    </script>
</body>
</html>
