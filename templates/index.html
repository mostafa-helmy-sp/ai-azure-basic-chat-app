<!DOCTYPE html>
<html>
<head>
    <title>Foundry Agent Chat</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 50px auto; }
        #chatbox { border: 1px solid #ccc; height: 300px; overflow-y: scroll; padding: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="chatbox"></div>
    <input type="text" id="userInput" placeholder="Ask your agent..." style="width: 80%;">
    <button onclick="sendMessage()">Send</button>

    <script>
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const box = document.getElementById('chatbox');
            box.innerHTML += `<div><b>You:</b> ${input.value}</div>`;
            
            const response = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: input.value})
            });
            const data = await response.json();
            box.innerHTML += `<div><b>Agent:</b> ${data.reply || data.error}</div>`;
            input.value = '';
        }
    </script>
</body>
</html>
