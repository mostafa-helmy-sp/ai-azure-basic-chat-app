<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Assistant</title>
    <style>
        :root {
            --page-bg: #f0f2f5;
            --chat-bg: #ffffff;
            --user-bubble-bg: #007bff;
            --agent-bubble-bg: #e9e9eb;
            --text-color: #0d0d0d;
            --border-color: #d1d1d1;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background-color: var(--page-bg);
            display: flex;
            justify-content: center;
            height: 100vh;
        }

        #app-container {
            width: 100%;
            max-width: 800px;
            height: 100%;
            display: flex;
            flex-direction: column;
            background-color: var(--chat-bg);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.05);
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        #welcome-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: #555;
        }

        #welcome-screen h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .message-wrapper {
            display: flex;
            margin-bottom: 15px;
            max-width: 85%;
        }

        .message {
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: white;
            margin-right: 12px;
            flex-shrink: 0;
        }

        /* User styles */
        .user-wrapper {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .user-wrapper .avatar {
            margin-right: 0;
            margin-left: 12px;
            background-color: #7d3c98;
        }

        .user {
            background-color: var(--user-bubble-bg);
            color: white;
        }

        /* Agent styles */
        .agent-wrapper {
            align-self: flex-start;
        }

        .agent-wrapper .avatar {
            background-color: #27ae60;
        }

        .agent {
            background-color: var(--agent-bubble-bg);
            color: var(--text-color);
        }

        .thinking {
            font-style: italic;
            color: #666;
        }

        /* Input Bar */
        #input-bar {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            border-top: 1px solid var(--border-color);
        }

        #input-form {
            display: flex;
            width: 100%;
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 5px;
        }

        #input {
            flex: 1;
            border: none;
            padding: 10px 15px;
            font-size: 16px;
            background: transparent;
        }

        #input:focus {
            outline: none;
        }

        #send-btn {
            border: none;
            background-color: var(--user-bubble-bg);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #send-btn:disabled {
            background-color: #a0a0a0;
            cursor: not-allowed;
        }
    </style>
</head>

<body>
    <div id="app-container">
        <div id="chat-container">
            <div id="welcome-screen">
                <h1>AI Assistant</h1>
                <p>Your secure and intelligent chat partner.</p>
            </div>
        </div>
        <div id="input-bar">
            <form id="input-form" style="width: 100%;">
                <input type="text" id="input" placeholder="Ask me anything..." autocomplete="off">
                <button id="send-btn" type="submit" disabled>&#10148;</button>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('input-form');
            const input = document.getElementById('input');
            const sendBtn = document.getElementById('send-btn');
            const chatContainer = document.getElementById('chat-container');
            const welcomeScreen = document.getElementById('welcome-screen');

            // This will hold the session state for the single user.
            let thread_id = null;

            input.addEventListener('input', () => {
                sendBtn.disabled = !input.value.trim();
            });

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                sendMessage();
            });

            async function sendMessage() {
                const content = input.value.trim();
                if (!content) return;

                if (welcomeScreen) {
                    welcomeScreen.style.display = 'none';
                }

                addMessage(content, 'user', 'U');
                input.value = '';
                sendBtn.disabled = true;

                const thinkingMessage = addMessage('...', 'agent', 'AI');
                thinkingMessage.querySelector('.message').classList.add('thinking');

                try {
                    const requestBody = { content };
                    // If we have a thread_id from a previous turn, send it.
                    if (thread_id) {
                        requestBody.thread_id = thread_id;
                    }

                    const response = await fetch('/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        // credentials: 'include' is removed as it's no longer needed
                        body: JSON.stringify(requestBody)
                    });

                    if (!response.ok) {
                        const err = await response.json();
                        throw new Error(err.error || `Server Error: Status ${response.status}`);
                    }

                    const data = await response.json();

                    // Store the thread_id returned by the server for the next request.
                    thread_id = data.thread_id;

                    thinkingMessage.querySelector('.message').textContent = data.response;
                    thinkingMessage.querySelector('.message').classList.remove('thinking');

                } catch (err) {
                    thinkingMessage.querySelector('.message').textContent = `Error: ${err.message}`;
                    thinkingMessage.querySelector('.message').style.color = 'red';
                    thinkingMessage.querySelector('.message').classList.remove('thinking');
                }
            }

            function addMessage(text, role, initial) {
                const wrapper = document.createElement('div');
                wrapper.className = `message-wrapper ${role}-wrapper`;

                const avatar = document.createElement('div');
                avatar.className = 'avatar';
                avatar.textContent = initial;

                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${role}`;
                messageDiv.textContent = text;

                wrapper.appendChild(avatar);
                wrapper.appendChild(messageDiv);
                chatContainer.appendChild(wrapper);
                chatContainer.scrollTop = chatContainer.scrollHeight;
                return wrapper;
            }
        });
    </script>

</body>

</html>
