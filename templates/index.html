<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Agent Chat</title>

<style>
body {
    font-family: system-ui;
    margin: 0;
    display: flex;
    flex-direction: column;
    height: 100vh;
    background: #f4f4f9;
}

#chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
}

.message {
    margin-bottom: 12px;
    padding: 10px;
    border-radius: 16px;
    max-width: 70%;
}

.user {
    background: #007bff;
    color: white;
    margin-left: auto;
}

.agent {
    background: #e5e5ea;
}

.thinking {
    color: #888;
    font-style: italic;
}

form {
    display: flex;
    padding: 10px;
    background: white;
    border-top: 1px solid #ddd;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 20px;
    border: 1px solid #ccc;
}

button {
    margin-left: 10px;
    border: none;
    background: #007bff;
    color: white;
    border-radius: 50%;
    width: 40px;
    cursor: pointer;
}

button:disabled {
    background: gray;
}
</style>
</head>

<body>

<div id="chat"></div>

<form id="form">
    <input id="input" placeholder="Ask something..." autocomplete="off">
    <button id="btn" disabled>➤</button>
</form>

<script>
let loading = false;

const form = document.getElementById('form');
const input = document.getElementById('input');
const btn = document.getElementById('btn');
const chat = document.getElementById('chat');

input.addEventListener('input', () => {
    btn.disabled = !input.value.trim() || loading;
});

form.addEventListener('submit', async (e) => {
    e.preventDefault();
    if (loading) return;

    const text = input.value.trim();
    if (!text) return;

    loading = true;
    btn.disabled = true;

    add(text, 'user');
    input.value = '';

    const thinking = add('Thinking...', 'agent thinking');

    try {
        const res = await fetch('/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: "include", // important for auth
            body: JSON.stringify({ content: text })
        });

        const data = await res.json();

        if (!res.ok) throw new Error(data.error);

        thinking.textContent = data.response;
        thinking.classList.remove('thinking');

    } catch (err) {
        thinking.textContent = "Error: " + err.message;
        thinking.style.color = "red";
    }

    loading = false;
    btn.disabled = false;
});

function add(text, type) {
    const div = document.createElement('div');
    div.className = 'message ' + type;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
}
</script>

</body>
</html>
