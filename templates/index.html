<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent Chat</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: #f4f4f9;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .message {
            margin-bottom: 15px;
            padding: 10px 15px;
            border-radius: 18px;
            max-width: 70%;
            line-height: 1.4;
        }

        .user {
            background-color: #007bff;
            color: white;
            align-self: flex-end;
            margin-left: 30%;
        }

        .agent {
            background-color: #e9e9eb;
            color: black;
            align-self: flex-start;
            margin-right: 30%;
        }

        .thinking {
            color: #888;
            font-style: italic;
        }

        #form {
            display: flex;
            padding: 10px;
            border-top: 1px solid #ddd;
            background-color: #fff;
        }

        #input {
            flex: 1;
            border: 1px solid #ccc;
            border-radius: 18px;
            padding: 10px 15px;
            font-size: 16px;
        }

        #input:focus {
            outline: none;
            border-color: #007bff;
        }

        button {
            border: none;
            background: #007bff;
            color: white;
            padding: 10px 15px;
            margin-left: 10px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
        }

        button:disabled {
            background: #a0a0a0;
        }
    </style>
</head>

<body>
    <div id="chat-container"></div>
    <form id="form">
        <input id="input" autocomplete="off" placeholder="Ask anything...">
        <button id="submitBtn" type="submit" disabled>&#10148;</button>
    </form>


    <script>
        document.addEventListener('DOMContentLoaded', () => {

            console.log("DOM fully loaded. Initializing script.");

            const form = document.getElementById('form');
            const input = document.getElementById('input');
            const submitBtn = document.getElementById('submitBtn');
            const chatContainer = document.getElementById('chat-container');
            let thread_id = null;

            console.log("Found elements:", { form, input, submitBtn, chatContainer });

            if (!form) {
                console.error("CRITICAL: Form element not found!");
                return;
            }

            input.addEventListener('input', () => {
                
                console.log("Input event fired.");
                submitBtn.disabled = !input.value.trim();
            });

            form.addEventListener('submit', async (e) => {
                
                console.log("Submit event fired!");

                e.preventDefault();
                const content = input.value.trim();
                if (!content) return;

                addMessage(content, 'user');
                input.value = '';
                submitBtn.disabled = true;

                const thinkingMessage = addMessage('...', 'agent thinking');

                try {
                    const requestBody = { content };
                    if (thread_id) {
                        requestBody.thread_id = thread_id;
                    }

                    console.log("Sending POST request to /chat with body:", JSON.stringify(requestBody));

                    const response = await fetch('/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(requestBody)
                    });

                    console.log("Received response from server:", response);

                    if (!response.ok) {
                        const error = await response.json();
                        throw new Error(error.error || `Server responded with status ${response.status}`);
                    }

                    const data = await response.json();
                    thread_id = data.thread_id;
                    console.log("Successfully updated thread_id:", thread_id);

                    thinkingMessage.textContent = data.response;
                    thinkingMessage.classList.remove('thinking');

                } catch (error) {
                    console.error("An error occurred during fetch:", error);
                    thinkingMessage.textContent = `Error: ${error.message}`;
                    thinkingMessage.classList.remove('thinking');
                    thinkingMessage.style.color = 'red';
                }
            });

            function addMessage(text, type) {
                const messageDiv = document.createElement('div');
                messageDiv.classList.add('message', type);
                messageDiv.textContent = text;
                chatContainer.appendChild(messageDiv);
                chatContainer.scrollTop = chatContainer.scrollHeight;
                return messageDiv;
            }
        });
    </script>

</body>

</html>
